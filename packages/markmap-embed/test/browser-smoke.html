<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>markmap-embed smoke</title>
    <style>
      #app {
        width: 800px;
        height: 500px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { createMindmap } from '/packages/markmap-embed/src/index.ts';

      const app = document.querySelector('#app');

      try {
        let clickedNodeContent = '';
        const embed = await createMindmap(app, {
          content: '# Root\n\n## Child',
          autoFit: true,
          onNodeClick: ({ node }) => {
            clickedNodeContent = node.content;
          },
        });
        await new Promise(requestAnimationFrame);

        const svgCount = app.querySelectorAll('svg').length;
        const initialText = app.textContent || '';
        app
          .querySelector('g.markmap-node[data-depth="1"] foreignObject div')
          .dispatchEvent(new MouseEvent('click', { bubbles: true }));

        await embed.update('# Next\n\n## Item');
        await new Promise(requestAnimationFrame);
        const updatedText = app.textContent || '';

        embed.destroy();

        window.__markmapSmoke = {
          ready: true,
          svgCount,
          initialText,
          updatedText,
          clickedNodeContent,
          afterDestroyChildCount: app.childElementCount,
        };
      } catch (error) {
        window.__markmapSmoke = {
          ready: false,
          error: String(error?.stack || error),
        };
        throw error;
      }
    </script>
  </body>
</html>
